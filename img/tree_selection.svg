<svg viewBox="0 0 1400 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    
    <!-- Styles -->
    <style>
      .decision-box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .flow-recommended { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .flow-deprecated { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .flow-caution { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
      .protocol-box { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
      .text-main { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .text-small { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .text-label { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
      .connector { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" class="title-text">Protocol and Flow Selection Decision Tree</text>
  
  <!-- Main Entry Point -->
  <rect x="550" y="60" width="300" height="50" class="decision-box" rx="5"/>
  <text x="700" y="85" class="text-main">What is your primary need?</text>
  
  <!-- Branch: Identity Federation -->
  <line x1="625" y1="110" x2="300" y2="170" class="connector"/>
  <text x="450" y="145" class="text-label">Identity Federation</text>
  
  <!-- Branch: API Authorization -->
  <line x1="775" y1="110" x2="1100" y2="170" class="connector"/>
  <text x="950" y="145" class="text-label">API Authorization</text>
  
  <!-- SAML Branch -->
  <rect x="150" y="180" width="300" height="50" class="protocol-box" rx="5"/>
  <text x="300" y="200" class="text-main">SAML</text>
  <text x="300" y="218" class="text-small">(Federation Protocol)</text>
  
  <line x1="300" y1="230" x2="300" y2="270" class="connector"/>
  
  <rect x="150" y="280" width="300" height="50" class="decision-box" rx="5"/>
  <text x="300" y="305" class="text-main">Who initiates the flow?</text>
  
  <!-- SAML SP-Initiated -->
  <line x1="225" y1="330" x2="150" y2="370" class="connector"/>
  <text x="180" y="355" class="text-label">User at SP</text>
  
  <ellipse cx="100" cy="410" rx="80" ry="35" class="flow-recommended"/>
  <text x="100" y="408" class="text-main">SP-Initiated</text>
  <text x="100" y="423" class="text-small">Flow</text>
  
  <!-- SAML IdP-Initiated -->
  <line x1="375" y1="330" x2="450" y2="370" class="connector"/>
  <text x="420" y="355" class="text-label">User at IdP</text>
  
  <ellipse cx="500" cy="410" rx="80" ry="35" class="flow-recommended"/>
  <text x="500" y="408" class="text-main">IdP-Initiated</text>
  <text x="500" y="423" class="text-small">Flow</text>
  
  <!-- OAuth/OIDC Decision Branch -->
  <rect x="950" y="180" width="300" height="50" class="decision-box" rx="5"/>
  <text x="1100" y="200" class="text-main">Do you need user</text>
  <text x="1100" y="218" class="text-small">authentication/identity?</text>
  
  <!-- Branch to OIDC -->
  <line x1="1025" y1="230" x2="850" y2="280" class="connector"/>
  <text x="920" y="260" class="text-label">YES</text>
  
  <rect x="650" y="290" width="200" height="40" class="protocol-box" rx="5"/>
  <text x="750" y="315" class="text-main">OpenID Connect</text>
  
  <!-- Branch to OAuth 2.0 -->
  <line x1="1175" y1="230" x2="1250" y2="280" class="connector"/>
  <text x="1220" y="260" class="text-label">NO</text>
  
  <rect x="1150" y="290" width="200" height="40" class="protocol-box" rx="5"/>
  <text x="1250" y="315" class="text-main">OAuth 2.0</text>
  
  <!-- OIDC Flow Selection -->
  <line x1="750" y1="330" x2="750" y2="370" class="connector"/>
  
  <rect x="600" y="380" width="300" height="50" class="decision-box" rx="5"/>
  <text x="750" y="405" class="text-main">What type of application?</text>
  
  <!-- OIDC: Web/Mobile Standard -->
  <line x1="665" y1="430" x2="550" y2="480" class="connector"/>
  <text x="600" y="460" class="text-label">Web/Mobile</text>
  
  <rect x="400" y="490" width="200" height="40" class="decision-box" rx="5"/>
  <text x="500" y="515" class="text-main">Is client public?</text>
  
  <line x1="450" y1="530" x2="380" y2="570" class="connector"/>
  <text x="410" y="555" class="text-label">YES</text>
  
  <ellipse cx="320" cy="610" rx="90" ry="35" class="flow-recommended"/>
  <text x="320" y="608" class="text-main">Authorization</text>
  <text x="320" y="623" class="text-small">Code + PKCE</text>
  
  <line x1="550" y1="530" x2="620" y2="570" class="connector"/>
  <text x="590" y="555" class="text-label">NO</text>
  
  <ellipse cx="680" cy="610" rx="90" ry="35" class="flow-recommended"/>
  <text x="680" y="608" class="text-main">Authorization</text>
  <text x="680" y="623" class="text-small">Code Flow</text>
  
  <!-- OIDC: Input-constrained device -->
  <line x1="750" y1="430" x2="750" y2="490" class="connector"/>
  <text x="780" y="465" class="text-label">Device</text>
  
  <ellipse cx="750" cy="540" rx="75" ry="30" class="flow-recommended"/>
  <text x="750" y="540" class="text-main">Device Flow</text>
  
  <!-- OIDC: Voice/CLI -->
  <line x1="835" y1="430" x2="900" y2="490" class="connector"/>
  <text x="875" y="465" class="text-label">Voice/CLI</text>
  
  <ellipse cx="950" cy="540" rx="70" ry="30" class="flow-recommended"/>
  <text x="950" y="540" class="text-main">CIBA Flow</text>
  
  <!-- OIDC: Deprecated Implicit -->
  <line x1="900" y1="405" x2="1050" y2="405" class="connector" stroke-dasharray="5,5"/>
  
  <ellipse cx="1120" cy="405" rx="70" ry="30" class="flow-deprecated"/>
  <text x="1120" y="403" class="text-main">Implicit</text>
  <text x="1120" y="418" class="text-small">(Deprecated)</text>
  
  <!-- OAuth 2.0 Flow Selection -->
  <line x1="1250" y1="330" x2="1250" y2="370" class="connector"/>
  
  <rect x="1100" y="380" width="300" height="50" class="decision-box" rx="5"/>
  <text x="1250" y="400" class="text-main">Who is accessing</text>
  <text x="1250" y="418" class="text-small">the resource?</text>
  
  <!-- OAuth: On behalf of user -->
  <line x1="1150" y1="430" x2="950" y2="490" class="connector"/>
  <text x="1040" y="465" class="text-label">User via app</text>
  
  <rect x="800" y="500" width="200" height="40" class="decision-box" rx="5"/>
  <text x="900" y="525" class="text-main">Public client?</text>
  
  <line x1="850" y1="540" x2="750" y2="580" class="connector"/>
  <text x="795" y="565" class="text-label">YES</text>
  
  <ellipse cx="680" cy="620" rx="90" ry="35" class="flow-recommended"/>
  <text x="680" y="618" class="text-main">Auth Code</text>
  <text x="680" y="633" class="text-small">+ PKCE</text>
  
  <line x1="950" y1="540" x2="1020" y2="580" class="connector"/>
  <text x="990" y="565" class="text-label">NO</text>
  
  <ellipse cx="1090" cy="620" rx="90" ry="35" class="flow-recommended"/>
  <text x="1090" y="618" class="text-main">Auth Code</text>
  <text x="1090" y="633" class="text-small">Flow</text>
  
  <!-- OAuth: Application itself -->
  <line x1="1250" y1="430" x2="1250" y2="490" class="connector"/>
  <text x="1285" y="465" class="text-label">App itself</text>
  
  <ellipse cx="1250" cy="540" rx="85" ry="30" class="flow-recommended"/>
  <text x="1250" y="538" class="text-main">Client</text>
  <text x="1250" y="553" class="text-small">Credentials</text>
  
  <!-- OAuth: External identity -->
  <line x1="1350" y1="430" x2="1350" y2="490" class="connector"/>
  <text x="1385" y="465" class="text-label">External</text>
  
  <ellipse cx="1350" cy="540" rx="70" ry="30" class="flow-recommended"/>
  <text x="1350" y="538" class="text-main">Assertion</text>
  <text x="1350" y="553" class="text-small">Grant</text>
  
  <!-- OAuth: User directly (deprecated) -->
  <line x1="1100" y1="405" x2="950" y2="405" class="connector" stroke-dasharray="5,5"/>
  <text x="1015" y="395" class="text-label">User direct</text>
  
  <ellipse cx="850" cy="405" rx="90" ry="35" class="flow-deprecated"/>
  <text x="850" y="400" class="text-main">Resource Owner</text>
  <text x="850" y="415" class="text-small">Password</text>
  <text x="850" y="428" class="text-small" font-size="9">(AVOID)</text>
  
  <!-- Legend -->
  <g transform="translate(50, 700)">
    <text x="0" y="0" class="text-main" text-anchor="start">Legend:</text>
    
    <rect x="0" y="15" width="80" height="30" class="flow-recommended" rx="3"/>
    <text x="90" y="33" class="text-small" text-anchor="start">Recommended & Secure</text>
    
    <rect x="0" y="55" width="80" height="30" class="flow-deprecated" rx="3"/>
    <text x="90" y="73" class="text-small" text-anchor="start">Deprecated/Unsafe</text>
    
    <rect x="0" y="95" width="80" height="30" class="decision-box" rx="3"/>
    <text x="90" y="113" class="text-small" text-anchor="start">Decision Point</text>
    
    <rect x="0" y="135" width="80" height="30" class="protocol-box" rx="3"/>
    <text x="90" y="153" class="text-small" text-anchor="start">Protocol Selection</text>
    
    <line x1="250" y1="30" x2="330" y2="30" class="connector"/>
    <text x="340" y="33" class="text-small" text-anchor="start">Standard path</text>
    
    <line x1="250" y1="70" x2="330" y2="70" class="connector" stroke-dasharray="5,5"/>
    <text x="340" y="73" class="text-small" text-anchor="start">Legacy/Edge case</text>
  </g>
  
  <!-- Notes -->
  <g transform="translate(50, 950)">
    <text x="0" y="0" class="text-main" text-anchor="start">Important Notes:</text>
    
    <text x="0" y="25" class="text-small" text-anchor="start" font-size="10">
      • PKCE is now MANDATORY for all public clients (OAuth 2.1)
    </text>
    <text x="0" y="45" class="text-small" text-anchor="start" font-size="10">
      • Implicit Flow is deprecated in OAuth 2.1 and forbidden for access tokens in OIDC
    </text>
    <text x="0" y="65" class="text-small" text-anchor="start" font-size="10">
      • Resource Owner Password Flow should only be used when no other option exists
    </text>
    <text x="0" y="85" class="text-small" text-anchor="start" font-size="10">
      • Authorization Code Flow + PKCE is the recommended default for most scenarios
    </text>
    <text x="0" y="105" class="text-small" text-anchor="start" font-size="10">
      • For authentication needs, prefer OIDC over plain OAuth 2.0
    </text>
  </g>
  
  <!-- Summary Statistics -->
  <g transform="translate(900, 950)">
    <rect x="0" y="-20" width="450" height="130" fill="none" stroke="#999" stroke-width="1" rx="5"/>
    <text x="10" y="0" class="text-main" text-anchor="start">Flow Complexity Summary:</text>
    
    <text x="20" y="25" class="text-small" text-anchor="start" font-size="10">
      SAML: 2 flows (SP-initiated, IdP-initiated)
    </text>
    <text x="20" y="45" class="text-small" text-anchor="start" font-size="10">
      OAuth 2.0: 6+ grant types (Code, PKCE, Client Cred., Assertion, Device, RO Password*)
    </text>
    <text x="20" y="65" class="text-small" text-anchor="start" font-size="10">
      OIDC: 4 primary flows + extensions (Code, PKCE, CIBA, Device, Hybrid*)
    </text>
    <text x="20" y="90" class="text-small" text-anchor="start" font-size="10" font-style="italic">
      * Deprecated or edge-case flows shown with dashed lines
    </text>
  </g>
</svg>
